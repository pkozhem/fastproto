syntax = "proto3";
package rich;

enum Role {
  ROLE_UNSPECIFIED = 0;
  ROLE_ADMIN = 1;
  ROLE_USER = 2;
}

message Address {
  string city = 1;
  string street = 2;
}

message User {
  int64 id = 1;
  string name = 2;
  optional string email = 3;
  Role role = 4;
  repeated string tags = 5;
  repeated int32 scores = 6;
  Address address = 7;
  repeated Address past_addresses = 8;
  map<string, int32> counters = 9;
  map<string, Address> places = 10;
  repeated Role roles = 11;

  oneof contact {
    string phone = 12;
    string telegram = 13;
  }
}
